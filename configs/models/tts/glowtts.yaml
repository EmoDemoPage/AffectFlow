base_config: ./base.yaml
task_cls: tasks.tts.glowtts.GlowTTSTask
dataset_cls: tasks.tts.dataset_utils.GradTTSDataset
model_cls: models.tts.glowtts.GlowTTS

hidden_channels: 192
filter_channels: 768
filter_channels_dp: 256
kernel_size: 3
p_dropout: 0.1
n_blocks_dec: 12
n_layers_enc: 6
n_heads: 2
p_dropout_dec: 0.05
dilation_rate: 1
kernel_size_dec: 5
n_block_layers: 4
n_sqz: 2
prenet: true
mean_only: true
hidden_channels_enc: 192
hidden_channels_dec: 192
window_size: 4
n_split: 4
n_sqz: 2
sigmoid_scale: false

n_spks: 1
gin_channels: 0

lr: 1.0
scheduler: warmup # rsqrt|warmup|none|noam

# train and eval
max_sentences: 32
warmup_updates: 4000

max_updates: 240000
