base_config:
  - ./base.yaml
task_cls: tasks.vocoder.vocos.VocosTask
dataset_cls: tasks.vocoder.dataset_utils.VocoderDataset

dim: 512
n_fft: 1024
hop_length: 256
padding: same
sample_rate: 22050
n_mels: 80
input_channels: 80

intermediate_dim: 1536
num_layers: 8
initial_learning_rate: 0.0005
mel_loss_coeff: 45
mrd_loss_coeff: 0.1
num_warmup_steps: 0 # Optimizers warmup steps
pretrain_mel_steps: 0 # 0 means GAN objective from the first iteration
adam_b1: 0.8
adam_b2: 0.9
max_steps: 2000000
val_check_interval: 2000
valid_infer_interval: 10000
max_samples: 16384
